name: Release

# Push a tag like `v0.1.0` to build the extension and attach the zip to a
# GitHub Release:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm zip
      - uses: softprops/action-gh-release@v2
        with:
          files: .output/*-chrome.zip
          generate_release_notes: true
