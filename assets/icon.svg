<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- rounded app tile -->
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#bg)"/>

  <!-- peeking eyes (looking down, over the hands) -->
  <g fill="#ffffff">
    <circle cx="50" cy="49" r="12.5"/>
    <circle cx="78" cy="49" r="12.5"/>
  </g>
  <g fill="#5B21B6">
    <circle cx="51" cy="52" r="5.2"/>
    <circle cx="79" cy="52" r="5.2"/>
  </g>
  <g fill="#ffffff">
    <circle cx="49" cy="50" r="1.7"/>
    <circle cx="77" cy="50" r="1.7"/>
  </g>

  <!-- two hands held up over the lower face (peek-a-boo) -->
  <rect x="17" y="70" width="94" height="52" rx="18" fill="#F1ECFE"/>
  <!-- seam where the two hands meet -->
  <rect x="62.4" y="72" width="3.2" height="50" rx="1.6" fill="#C4B5FD"/>
  <!-- finger separations -->
  <g stroke="#C4B5FD" stroke-width="3" stroke-linecap="round">
    <line x1="40" y1="72" x2="40" y2="92"/>
    <line x1="51" y1="71" x2="51" y2="92"/>
    <line x1="77" y1="71" x2="77" y2="92"/>
    <line x1="88" y1="72" x2="88" y2="92"/>
  </g>
</svg>
